name: Container Push

on:
  workflow_call:
    inputs:
      ref-name:
        description: "Checkout ref name. Optional default is empty."
        type: string
      build-args:
        description: "Additional build arguments for the container image. Default is empty."
        type: string
      build-context:
        description: "Path to image build context. Default is ."
        default: .
        type: string
      build-docker-file:
        description: "Path to the docker file. Default is ./Dockerfile"
        type: string
        default: ./Dockerfile
      build-secrets:
        description: "Use these build-secrets for the docker build process. It is not possible to use github secrets in here!"
        type: string
      build-secrets-name:
        description: "The name of the github secret to use as build secrets."
        type: string
      image-labels:
        description: "Image labels."
        required: true
        type: string
      image-tags:
        description: "Docker meta action tag string."
        default: |
          # create container tag for git tags
          type=ref,event=tag,value=latest
          type=match,pattern=v(.*),group=1
          type=ref,event=pr
          # use unstable for main branch
          type=raw,value=unstable,enable={{is_default_branch}}
          # use unstable-release for release branches
          type=raw,value=unstable-release,enable=${{startsWith(github.ref, 'refs/heads/release/')}}
        type: string
      image-flavor:
        description: "Image flavor."
        default: "latest=false"
        type: string
      image-urls:
        description: "Ghcr.io and Greenbone registry image urls to push to."
        type: string

    secrets:
      COSIGN_KEY_OPENSIGHT:
        required: false
      COSIGN_KEY_PASSWORD_OPENSIGHT:
        required: false
      GREENBONE_BOT:
        required: false
      GREENBONE_BOT_PACKAGES_READ_TOKEN:
        required: false
      GREENBONE_BOT_PACKAGES_WRITE_TOKEN:
        required: false
      GREENBONE_BOT_TOKEN:
        required: false
      GREENBONE_REGISTRY:
        required: false
      GREENBONE_REGISTRY_USER:
        required: false
      GREENBONE_REGISTRY_TOKEN:
        required: false
      GREENBONE_REGISTRY_REPLICATION_USER:
        required: false
      GREENBONE_REGISTRY_REPLICATION_TOKEN:
        required: false
      GITHUB_TOKEN:
        required: false

    outputs:
      digest:
        description: "The container digest"
        value: ${{ jobs.manifest.outputs.digest }}

jobs:
  build-amd64:
    name: Build amd64 container
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-and-push.outputs.digest }}
      tags: ${{ steps.build-and-push.outputs.tags }}
      annotations: ${{ steps.build-and-push.outputs.annotations }}
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref-name }}

      - name: Container build and push
        id: build-and-push
        uses: greenbone/actions/container-build-push-generic@v3
        with:
          build-context: ${{ inputs.build-context }}
          build-docker-file: ${{ inputs.build-docker-file }}
          build-args: ${{ inputs.build-args }}
          build-secrets: ${{ inputs.build-secrets || inputs.build-secrets-name && secrets[inputs.build-secrets-name] }}
          image-url: ${{ github.repository }}
          image-labels: ${{ inputs.image-labels }}
          image-tags: raw,value=${{ steps.checkout.outputs.ref }}-amd64
          image-platforms: linux/amd64
          image-flavor: latest=false
          registry: 'ghcr.io'
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  build-arm64:
    name: Build arm64 container
    if: github.event_name != 'pull_request'
    runs-on: self-hosted-generic-vm-arm64
    outputs:
      digest: ${{ steps.build-and-push.outputs.digest }}
      tags: ${{ steps.build-and-push.outputs.tags }}
      annotations: ${{ steps.build-and-push.outputs.annotations }}
    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref-name }}

      - name: Container build and push
        id: build-and-push
        uses: greenbone/actions/container-build-push-generic@v3
        with:
          build-context: ${{ inputs.build-context }}
          build-docker-file: ${{ inputs.build-docker-file }}
          build-args: ${{ inputs.build-args }}
          build-secrets: ${{ inputs.build-secrets || inputs.build-secrets-name && secrets[inputs.build-secrets-name] }}
          image-url: ${{ github.repository }}
          image-labels: ${{ inputs.image-labels }}
          image-tags: raw,value=${{ steps.checkout.outputs.ref }}-arm64
          image-platforms: linux/arm64
          image-flavor: latest=false
          registry: 'ghcr.io'
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  manifest:
    name: Create container multi arch manifest
    if: github.event_name != 'pull_request'
    runs-on: self-hosted-generic
    needs:
      - build-amd64
      - build-arm64
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ inputs.image-urls }}
          flavor: ${{ inputs.image-flavor }}
          tags: ${{ inputs.image-tags }}

      - name: Login to ${{ vars.GREENBONE_REGISTRY }} Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GREENBONE_REGISTRY }}
          username: ${{ secrets.GREENBONE_REGISTRY_USER }}
          password: ${{ secrets.GREENBONE_REGISTRY_TOKEN }}

      - name: Create multi arch manifest
        id: manifest
        uses: greenbone/actions/container-multi-arch-manifest@f0c8b8268b98d09237774489fefc2c0ab77703aa # v3.27.13
        with:
          cosign-key: ${{ secrets[inputs.cosign-key-secret-name] }}
          cosign-key-password: ${{ secrets[inputs.cosign-key-password-secret-name] }}
          cosign-tlog-upload: "false"
          annotations: |
            ${{ needs.build-amd64.outputs.annotations }}
            ${{ needs.build-arm64.outputs.annotations }}
          meta-tags: ${{ steps.meta.outputs.tags }}
          digests: |
            ${{ needs.build-amd64.outputs.digest }}
            ${{ needs.build-arm64.outputs.digest }}
          url: ${{ inputs.image-url }}
          registry: 'ghcr.io'
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
