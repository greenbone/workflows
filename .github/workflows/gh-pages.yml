name: Deploy docs to GitHub Pages

on:
  workflow_call:
    inputs:
      artifact-path:
        description: "Path to the folder containing build artifacts to deploy"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
    deploy:
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.artifact-path }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4