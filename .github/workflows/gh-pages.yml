    #      echo "Deleted $(echo "$artifact_ids" 
          # const { data } = await github.rest.actions.listWorkflowRunArtifacts({
          #   owner: context.repñ.owner,
          #   repo: context.repo.repo,
          #   run_id: context.repo.runId,
          # });
          # const conflicts = artifacts.data.artifacts.filter(a => a.name === 'github-pages')
          # for(async a => {await github.rest.actions.deleteArtifact(
          # {
