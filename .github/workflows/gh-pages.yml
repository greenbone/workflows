name: Deploy docs to GitHub Pages

on:
  workflow_call:
    inputs:
      artifact-names:
        description: " artifact names to download"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Parse artifact names
      id: parse
      run: |
        echo "${{ inputs.artifact-names}}" | tr ',' '\n' > artifacts.txt
        echo "Artifacts to process:"
        cat artifacts.txt
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-names}}
        path: artifact-dir
    - name: Extract artifact
      run: |
        while read artifact; do
          echo "Extracting $artifact"
          mkdir -p "artifact-dir/$artifact"
          tar --xz -xvf artifact-dir/$artifact.tar.xz -C "artifact-dir/$artifact"
        done > artifacts.txt
    - name: debug contents
      run: |
          pwd
          ls -R artifact-dir/$artifact
    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: artifact-dir/
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    - name: Show URLs
      run: |
        echo "Preview_url: ${{ steps.deployment.outputs.preview_url }}"
        echo "Page_url: ${{ steps.deployment.outputs.page_url }}"
        echo "All outputs:"
        echo "${{ toJSON(steps.deployment.outputs) }}"
