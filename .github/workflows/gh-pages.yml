name: Deploy docs to GitHub Pages

on:
  workflow_call:
    inputs:
      name:
        description: " artifact names "
        required: true
        type: string
      path:
        description: " artifact paths"
        required: true
        type: string
      retention-day:
          required: false
          type: number
          default: 2

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: print artifacts
      run: |
        echo "name: ${{ inputs.name}}"
        echo "path: ${{ inputs.path }}"
        cd ${{ inputs.path }}
        pwd
        ls
    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        name: ${{ inputs.name  }}
        path: extracted/${{ inputs.path  }}
        retention-day: ${{ inputs.retention-day }}
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
