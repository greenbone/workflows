    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name}}
        path: artifact-dir
    - name: verify artifacts
      run: |
        pwd
        ls -R artifact-dir
    - name: Extract artifact
      run: |
        tar --xz -xvf artifact-dir/${{ inputs.artifact-name }}.tar.xz -C artifact-dir/
    - name: debug contents
      run: |
          pwd
          ls -R artifact-dir
    # - name: Clean all previous artifacts
    #   uses: actions/github-script@v7 
    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: artifact-dir/${{ inputs.artifact-name }}
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    - name: Show URLs
      run: |
        echo "Preview_url: ${{ steps.deployment.outputs.preview_url }}"
        echo "Page_url: ${{ steps.deployment.outputs.page_url }}"
