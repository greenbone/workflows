name: Deploy docs to GitHub Pages

on:
  workflow_call:
    inputs:
      artifact-name:
        description: " artifact names to download"
        required: true
        type: string
      # artifact-path:
      #   description: " artifact paths"
      #   required: true
      #   type: string
      # retention-day:
      #     required: false
      #     type: number
      #     default: 2

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
