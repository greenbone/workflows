name: Deploy docs to GitHub Pages

on:
  workflow_call:
    inputs:
      matrix_name:
        description: " artifact names "
        required: true
        type: string
      matrix_path:
        description: " artifact paths"
        required: true
        type: string
      retention-day:
          required: false
          type: number
          default: 2

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: print artifacts
      run: |
        echo "name: ${{ inputs.matrix_name}}"
        echo "path: ${{ inputs.matrix_path }}"
        cd ${{ inputs.matrix_path }}
        ls
    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        artifact-name: ${{ inputs.matrix_name  }}
        artifact-path: ${{ inputs.matrix_path  }}
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
